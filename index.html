<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Antigravity Daily Briefing</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    /* ===== ROOT ===== */
    :root {
      --bg:         #0d1117;
      --panel:      #161b22;
      --card:       #1c2128;
      --hover:      #21262d;
      --border:     #30363d;
      --dim:        #21262d;
      --text:       #e6edf3;
      --muted:      #8b949e;
      --subtle:     #484f58;
      --accent:     #58a6ff;
      --accent-dim: rgba(88,166,255,.12);
      --green:      #3fb950;
      --yellow:     #d29922;
      --sidebar:    260px;
      --safe-b:     env(safe-area-inset-bottom, 0px);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; scroll-behavior: smooth; }
    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ===== LAYOUT ===== */
    .layout {
      display: flex;
      min-height: 100vh;
    }

    /* ===== SIDEBAR (desktop) ===== */
    #sidebar {
      width: var(--sidebar);
      min-width: var(--sidebar);
      height: 100vh;
      position: sticky;
      top: 0;
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
    }
    .sidebar-logo {
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-rocket { font-size: 22px; line-height: 1; flex-shrink: 0; }
    .logo-title { font-size: 14px; font-weight: 700; letter-spacing: -.02em; }
    .logo-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .sidebar-label {
      padding: 14px 16px 5px;
      font-size: 10.5px;
      font-weight: 600;
      color: var(--subtle);
      text-transform: uppercase;
      letter-spacing: .07em;
    }
    #date-list {
      list-style: none;
      padding: 0 8px 16px;
    }
    .date-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 7px 8px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      text-align: left;
      transition: background .1s, color .1s;
    }
    .date-btn:hover { background: var(--hover); color: var(--text); }
    .date-btn.active { background: var(--accent-dim); color: var(--accent); font-weight: 500; }
    .date-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--subtle);
      flex-shrink: 0;
    }
    .date-btn.active .date-dot { background: var(--accent); }
    .date-label { flex: 1; }
    .date-wd { font-size: 11px; color: var(--subtle); }
    .date-btn.active .date-wd { color: rgba(88,166,255,.5); }

    /* ===== MAIN ===== */
    #main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(13,17,23,.9);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    /* hamburger — mobile only */
    #menu-btn {
      display: none;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
    }
    .topbar-date { font-size: 14px; font-weight: 600; }
    .badge {
      font-size: 10.5px;
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .badge.today { border-color: rgba(63,185,80,.4); color: var(--green); background: rgba(63,185,80,.08); }
    .nav-btns { margin-left: auto; display: flex; gap: 6px; }
    .nav-btn {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: all .1s;
      white-space: nowrap;
    }
    .nav-btn:hover:not(:disabled) { background: var(--hover); color: var(--text); }
    .nav-btn:disabled { opacity: .3; cursor: not-allowed; }

    /* ===== CONTENT ===== */
    #content {
      flex: 1;
      padding: 36px 40px 60px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    /* spinner */
    .spinner-wrap {
      display: flex; align-items: center; gap: 10px;
      color: var(--muted); font-size: 14px; padding: 60px 0;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* error */
    .error-box {
      display: none;
      padding: 16px;
      background: rgba(248,81,73,.07);
      border: 1px solid rgba(248,81,73,.3);
      border-radius: 8px;
      color: #f85149;
      font-size: 13px;
    }

    /* ===== MARKDOWN ===== */
    .md { animation: fadein .18s ease; }
    @keyframes fadein { from { opacity:0; transform: translateY(5px); } to { opacity:1; } }

    /* H1 */
    .md h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -.02em;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
      line-height: 1.35;
    }

    /* メタ行（bold Date: etc） */
    .md > p:first-of-type {
      font-size: 12.5px;
      color: var(--muted);
      margin-bottom: 4px;
      line-height: 1.6;
    }

    /* H2 = セクションヘッダー */
    .md h2 {
      font-size: 15px;
      font-weight: 600;
      margin-top: 36px;
      margin-bottom: 12px;
      padding: 9px 14px;
      background: var(--card);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      letter-spacing: -.01em;
    }

    /* H3 = ニュースタイトル */
    .md h3 {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--text);
      margin-top: 18px;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .md h3 a {
      color: var(--accent);
      text-decoration: none;
    }
    .md h3 a:hover { text-decoration: underline; }

    /* blockquote = ニュースカード */
    .md blockquote {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--dim);
      border-radius: 8px;
      padding: 12px 14px;
      margin: 0 0 18px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.75;
    }
    .md blockquote p { margin: 0; font-size: inherit; color: inherit; line-height: inherit; }
    .md blockquote p + p { margin-top: 6px; }
    .md blockquote strong { color: var(--text); }

    /* 【詳細概要】 – 背景を少し変えて視覚的に区切る */
    .md blockquote .detail-section {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 12.5px;
      color: var(--muted);
    }

    /* Exchange rate blockquote */
    .md h2:first-of-type + blockquote,
    .md h2 + blockquote {
      border-left-color: var(--yellow);
    }

    /* HR */
    .md hr {
      border: none;
      border-top: 1px solid var(--dim);
      margin: 28px 0;
    }

    /* inline elements */
    .md strong { color: var(--text); font-weight: 600; }
    .md em { color: #ffa657; font-style: italic; }
    .md a { color: var(--accent); text-decoration: none; }
    .md a:hover { text-decoration: underline; }
    .md p { font-size: 13.5px; color: var(--muted); line-height: 1.75; margin-bottom: 10px; }
    .md ul, .md ol { padding-left: 18px; margin: 6px 0 12px; }
    .md li { font-size: 13.5px; color: var(--muted); line-height: 1.7; margin-bottom: 3px; }

    /* Multi-agent analysis section */
    .md h2:last-of-type { border-left-color: #bc8cff; }

    /* ===== MOBILE DRAWER ===== */
    #drawer-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 40;
    }
    #drawer {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 280px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      z-index: 50;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transform: translateX(-100%);
      transition: transform .22s cubic-bezier(.25,.46,.45,.94);
    }
    #drawer.open { transform: translateX(0); }
    #drawer-overlay.open { display: block; }
    .drawer-close {
      position: absolute; top: 12px; right: 12px;
      background: none; border: 1px solid var(--border);
      color: var(--muted); border-radius: 6px;
      padding: 4px 8px; font-size: 14px; cursor: pointer;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 720px) {
      #sidebar { display: none; }
      #menu-btn { display: block; }
      #content {
        padding: 24px 16px calc(24px + var(--safe-b));
      }
      .topbar { padding: 10px 14px; }
      .nav-btn { padding: 5px 8px; font-size: 11px; }
      .md h1 { font-size: 17px; }
      .md h2 { font-size: 14px; margin-top: 28px; }
      .md h3 { font-size: 13px; }
      .md blockquote { font-size: 12.5px; padding: 10px 12px; }
    }
  </style>
</head>
<body>

<!-- MOBILE DRAWER -->
<div id="drawer-overlay"></div>
<div id="drawer">
  <button class="drawer-close" id="drawer-close-btn">✕</button>
  <div class="sidebar-logo">
    <span class="logo-rocket">🚀</span>
    <div>
      <div class="logo-title">Antigravity</div>
      <div class="logo-sub">Daily Executive Briefing</div>
    </div>
  </div>
  <div class="sidebar-label">Archives</div>
  <ul id="drawer-list" class="date-list"></ul>
</div>

<!-- MAIN LAYOUT -->
<div class="layout">
  <!-- SIDEBAR (desktop) -->
  <aside id="sidebar">
    <div class="sidebar-logo">
      <span class="logo-rocket">🚀</span>
      <div>
        <div class="logo-title">Antigravity</div>
        <div class="logo-sub">Daily Executive Briefing</div>
      </div>
    </div>
    <div class="sidebar-label">Archives</div>
    <ul id="date-list" class="date-list"></ul>
  </aside>

  <!-- CONTENT -->
  <main id="main">
    <header class="topbar">
      <button id="menu-btn">☰</button>
      <span class="topbar-date" id="topbar-date">—</span>
      <span class="badge" id="topbar-badge">ARCHIVE</span>
      <div class="nav-btns">
        <button class="nav-btn" id="btn-prev">← 前日</button>
        <button class="nav-btn" id="btn-next">翌日 →</button>
      </div>
    </header>
    <div id="content">
      <div class="spinner-wrap"><div class="spinner"></div><span>Loading...</span></div>
      <div class="error-box" id="error-box"></div>
      <div id="md-output" class="md" style="display:none"></div>
    </div>
  </main>
</div>

<script>
const BASE = '/antigravity-daily-news';
const DIR  = `${BASE}/daily_briefings`;
const WD   = ['日','月','火','水','木','金','土'];

// ===== DATE LIST =====
// Populated from known files; update as new briefings are added.
let DATES = [
  "2026-02-26","2026-02-27","2026-02-28",
  "2026-03-01","2026-03-02","2026-03-03","2026-03-04","2026-03-05","2026-03-06",
  "2026-03-07","2026-03-08","2026-03-09","2026-03-10","2026-03-11","2026-03-12",
  "2026-03-13","2026-03-14","2026-03-15","2026-03-16",
].reverse();

let current = 0;

// ===== HELPERS =====
function wd(d) { return WD[new Date(d + 'T00:00:00').getDay()]; }
function fmt(d) { const [,m,day] = d.split('-'); return `${+m}/${+day}`; }
function isToday(d) { return d === new Date().toISOString().slice(0,10); }

// ===== BUILD DATE LISTS =====
function makeDateItem(idx, listEl, isDrawer) {
  const d = DATES[idx];
  const li = document.createElement('li');
  const btn = document.createElement('button');
  btn.className = 'date-btn' + (idx === 0 ? ' active' : '');
  btn.dataset.idx = idx;
  btn.innerHTML = `
    <span class="date-dot"></span>
    <span class="date-label">${fmt(d)}</span>
    <span class="date-wd">${wd(d)}</span>
  `;
  btn.addEventListener('click', () => {
    loadDate(idx);
    if (isDrawer) closeDrawer();
  });
  li.appendChild(btn);
  listEl.appendChild(li);
}

function buildLists() {
  const sidebar = document.getElementById('date-list');
  const drawer  = document.getElementById('drawer-list');
  DATES.forEach((_, i) => {
    makeDateItem(i, sidebar, false);
    makeDateItem(i, drawer, true);
  });
}

function setActive(idx) {
  document.querySelectorAll('.date-btn').forEach(b => {
    b.classList.toggle('active', +b.dataset.idx === idx);
  });
}

// ===== LOAD & RENDER =====
async function loadDate(idx) {
  current = idx;
  const d = DATES[idx];

  setActive(idx);

  // topbar
  const [y,m,day] = d.split('-');
  document.getElementById('topbar-date').textContent = `${y}年${m}月${day}日（${wd(d)}）`;
  const badge = document.getElementById('topbar-badge');
  if (isToday(d)) { badge.textContent = 'TODAY'; badge.className = 'badge today'; }
  else            { badge.textContent = 'ARCHIVE'; badge.className = 'badge'; }

  // nav
  document.getElementById('btn-prev').disabled = idx >= DATES.length - 1;
  document.getElementById('btn-next').disabled = idx <= 0;

  // show spinner
  document.querySelector('.spinner-wrap').style.display = 'flex';
  document.getElementById('md-output').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';

  window.scrollTo({ top: 0, behavior: 'instant' });

  try {
    const res = await fetch(`${DIR}/Briefing_${d}.md`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();

    // Post-process: wrap 【詳細概要】 blocks for styling
    const html = marked.parse(text);
    const out = document.getElementById('md-output');
    out.innerHTML = html;

    // Open links in new tab
    out.querySelectorAll('a[href]').forEach(a => { a.target = '_blank'; a.rel = 'noopener'; });

    document.querySelector('.spinner-wrap').style.display = 'none';
    out.style.display = 'block';
  } catch(e) {
    document.querySelector('.spinner-wrap').style.display = 'none';
    const eb = document.getElementById('error-box');
    eb.textContent = `ブリーフィングを読み込めませんでした: ${e.message}`;
    eb.style.display = 'block';
  }
}

// ===== NAV =====
document.getElementById('btn-prev').addEventListener('click', () => { if (current < DATES.length-1) loadDate(current+1); });
document.getElementById('btn-next').addEventListener('click', () => { if (current > 0) loadDate(current-1); });
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  && current < DATES.length-1) loadDate(current+1);
  if (e.key === 'ArrowRight' && current > 0) loadDate(current-1);
});

// ===== DRAWER (mobile) =====
function openDrawer()  {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('drawer-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('drawer-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('menu-btn').addEventListener('click', openDrawer);
document.getElementById('drawer-close-btn').addEventListener('click', closeDrawer);
document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);

// ===== INIT =====
buildLists();
loadDate(0);
</script>
</body>
</html>
